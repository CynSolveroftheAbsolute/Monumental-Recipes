modLoader = "javafml"
loaderVersion = "[1,)"
issueTrackerURL = "https://github.com/ModernGamingWorlds-Mods/Monumental-Recipes/issues"
license = "MIT"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "ModernGamingWorld"
description = '''
${description}
'''
logoFile = "assets/${id}/icon.png"
logoBlur = false

[[dependencies.${id}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraftVersion},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "neoforge"
type = "required"
versionRange = ">=${neoforgeVersion}"
ordering = "NONE"
side = "BOTH"
