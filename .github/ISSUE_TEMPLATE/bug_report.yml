name: Bug Report
description: Report a bug or issue with Monumental Recipes
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below so we can help resolve it quickly.

  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      description: Which Minecraft version are you playing on?
      placeholder: "1.20.1"
    validations:
      required: true

  - type: dropdown
    id: loader
    attributes:
      label: Mod Loader
      description: Which mod loader are you using?
      options:
        - Forge
        - NeoForge
    validations:
      required: true

  - type: input
    id: loader-version
    attributes:
      label: Mod Loader Version
      description: Which version of Forge/NeoForge are you using?
      placeholder: "47.4.20"
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Monumental Recipes Version
      description: Which version of Monumental Recipes are you running?
      placeholder: "1.0.2"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Crash Log / Latest Log
      description: Please paste any relevant log output. You can upload files by dragging them into this field.
      render: shell
    validations:
      required: false

  - type: textarea
    id: mods
    attributes:
      label: Mod List
      description: If relevant, please list any other mods that might be interacting with this issue. You can also attach a screenshot of your mods folder.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      description: Please confirm the following before submitting
      options:
        - label: I am using the latest version of Monumental Recipes
          required: true
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have tested with only the required mods to isolate the issue (if possible)
          required: false
